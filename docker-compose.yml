services:
  postgres:
    image: postgres:16-alpine
    container_name: chs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chs_user
      POSTGRES_PASSWORD: chs_pass
      POSTGRES_DB: codeheaven
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chs_user -d codeheaven']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chs_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://chs_user:chs_pass@postgres:5432/codeheaven?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - '4000:4000'
    command: >
      sh -c "npx prisma migrate deploy && node dist/server.js"

volumes:
  postgres_data:
